# Reusable CI & Deploy workflow for VPS-hosted apps
# Called by individual app workflows with app-specific parameters.
#
# Usage in caller repo:
#   jobs:
#     deploy:
#       uses: chrishan-xyz/shared/.github/workflows/deploy-vps.yml@main
#       with:
#         app-name: feed
#         vps-path: ~/caddy/feed
#         container-name: feed
#         test-command: npm test
#         build-client: true
#       secrets:
#         VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
#         ARLOS_API_KEY: ${{ secrets.ARLOS_API_KEY }}

name: Deploy to VPS

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Application name (used for deploy recording and logs)'
        required: true
        type: string
      vps-path:
        description: 'Absolute path on VPS where source is synced (e.g. ~/caddy/feed)'
        required: true
        type: string
      container-name:
        description: 'Docker container/service name in docker-compose'
        required: true
        type: string
      test-command:
        description: 'Test command to run (e.g. "npm test", "npx vitest run tests/")'
        default: 'npm test'
        type: string
      build-client:
        description: 'Whether to build a client/ subdirectory'
        default: true
        type: boolean
      node-version:
        description: 'Node.js version for CI'
        default: '20'
        type: string
      health-endpoint:
        description: 'Health check path inside the container'
        default: '/api/health'
        type: string
      health-port:
        description: 'Port the app listens on inside the container'
        default: '8080'
        type: string
      source-subdir:
        description: 'Subdirectory to sync (default: repo root). For monorepos like chrishan.xyz/home/'
        default: './'
        type: string
      rsync-excludes:
        description: 'Extra rsync --exclude flags (space-separated)'
        default: ''
        type: string
      docker-image-name:
        description: 'Local Docker image tag (default: container-name:latest)'
        default: ''
        type: string
      npm-workdir:
        description: 'Working directory for npm ci/test (default: repo root)'
        default: '.'
        type: string
      deploy-strategy:
        description: "Deploy strategy: 'in-place' (compose restart) or 'blue-green' (GHCR push + swap)"
        default: 'in-place'
        type: string
      tsx-runtime:
        description: 'Use tsx server.ts as container CMD'
        default: false
        type: boolean
      ghcr-image:
        description: 'GHCR image name for blue-green (e.g. ghcr.io/christopher-han/arlos)'
        default: ''
        type: string
      smoke-test-routes:
        description: 'Comma-separated routes to check during smoke test (e.g. /api/health,/api/tasks). If empty, only health-endpoint is checked.'
        default: ''
        type: string
      smoke-test-json-routes:
        description: 'Comma-separated API routes that MUST return 200 + JSON content-type (not 401, not HTML). Catches auth middleware bugs.'
        default: ''
        type: string
      auto-merge-branches:
        description: 'Comma-separated branch glob patterns to auto-merge to main before deploy (e.g. "hatch/**,navi/**"). Empty = disabled.'
        default: ''
        type: string
      db-validation:
        description: 'Verify DB_PATH env in running container matches the app name (prevents wrong-database bugs)'
        default: true
        type: boolean
      public-url:
        description: 'Public URL of the deployed site (e.g. https://arlo.chrishan.xyz). If set, post-deploy verifies the site is reachable through Caddy/TLS, not just the container.'
        default: ''
        type: string
      strict-typecheck:
        description: 'When true, tsc --noEmit failures block the build instead of continuing. Only enable after fixing all type errors.'
        default: false
        type: boolean
    secrets:
      VPS_SSH_KEY:
        required: true
      ARLOS_API_KEY:
        required: false
      CROSS_REPO_TOKEN:
        required: false
      GHCR_TOKEN:
        required: false
      NTFY_TOKEN:
        required: false

env:
  VPS_HOST: 204.168.189.154
  VPS_USER: chris
  ARLOS_URL: https://arlo.chrishan.xyz

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone shared dependencies
        env:
          CLONE_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          SHARED_DIR="$(cd .. && pwd)/shared"
          if [ -n "$CLONE_TOKEN" ]; then
            git clone --depth 1 https://x-access-token:${CLONE_TOKEN}@github.com/chrishan-xyz/shared.git "$SHARED_DIR"
          else
            git clone --depth 1 https://github.com/chrishan-xyz/shared.git "$SHARED_DIR" || {
              echo "❌ Cannot clone private shared repo — set CROSS_REPO_TOKEN org secret"
              exit 1
            }
          fi
          cd "$SHARED_DIR" && npm install --omit=dev 2>/dev/null || true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.npm-workdir }}/package-lock.json
      - name: Install dependencies
        run: cd ${{ inputs.npm-workdir }} && npm ci
      - name: Typecheck (server)
        run: cd ${{ inputs.npm-workdir }} && npx tsc --noEmit
        continue-on-error: ${{ inputs.strict-typecheck != true }}
      - name: Typecheck (client)
        if: inputs.build-client
        run: cd ${{ inputs.npm-workdir }}/client && npx tsc --noEmit
        continue-on-error: true
      - name: Run tests
        run: cd ${{ inputs.npm-workdir }} && ${{ inputs.test-command }}
        continue-on-error: true
      - name: Build client
        if: inputs.build-client
        run: cd ${{ inputs.npm-workdir }}/client && npm ci && npm run build

      - name: Notify CI result via ntfy
        if: always()
        continue-on-error: true
        run: |
          NTFY_KEY="${{ secrets.NTFY_TOKEN }}"
          [ -z "$NTFY_KEY" ] && exit 0

          REPO="${{ github.repository }}"
          APP="${REPO##*/}"
          BRANCH="${{ github.ref_name }}"
          COMMIT_SHORT=$(echo '${{ github.sha }}' | cut -c1-7)
          RUN_URL="${{ github.server_url }}/${REPO}/actions/runs/${{ github.run_id }}"

          if [ "${{ job.status }}" = "success" ]; then
            MSG="✅ CI passed: ${APP} (${BRANCH} ${COMMIT_SHORT})"
            PRIO="default"
            TAG="white_check_mark"
          else
            MSG="🔴 CI failed: ${APP} (${BRANCH} ${COMMIT_SHORT})"
            PRIO="high"
            TAG="rotating_light"
          fi

          curl -sf -d "${MSG}" \
            -H "Authorization: Bearer ${NTFY_KEY}" \
            -H "Title: CI: ${APP}" \
            -H "Tags: ${TAG}" \
            -H "Click: ${RUN_URL}" \
            -H "Priority: ${PRIO}" \
            "https://ntfy.chrishan.xyz/ci" || true

  # ──── AUTO-MERGE (optional) ────
  # When auto-merge-branches is set and we're on a matching feature branch,
  # merge to main after tests pass, then let deploy pick it up.
  auto-merge:
    needs: test
    if: inputs.auto-merge-branches != '' && github.ref != 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: auto-merge-${{ inputs.app-name }}
      cancel-in-progress: true
    outputs:
      merged: ${{ steps.merge.outputs.merged }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Configure git
        run: |
          git config user.name "arlo-ci"
          git config user.email "arlo-ci@users.noreply.github.com"

      - name: Coalescing delay
        run: |
          echo "⏳ Waiting 15s for deploy coalescing..."
          sleep 15

      - name: Merge to main
        id: merge
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "🔀 Merging $BRANCH → main"

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          # Try fast-forward first, fall back to merge commit
          if git merge --ff-only "origin/$BRANCH" 2>/dev/null; then
            echo "✅ Fast-forward merge succeeded"
          else
            echo "⚠️  Cannot fast-forward — attempting merge commit"
            if git merge "origin/$BRANCH" --no-edit 2>/dev/null; then
              echo "✅ Merge commit succeeded"
            else
              echo "❌ CONFLICT — $BRANCH cannot be auto-merged"
              echo "   The dispatcher must rebase on main and re-push."
              git merge --abort 2>/dev/null
              echo "merged=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          git push origin main
          echo "merged=true" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed merged main"

      - name: Delete feature branch
        if: steps.merge.outputs.merged == 'true'
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git push origin --delete "$BRANCH" 2>/dev/null || echo "Branch already deleted"
          echo "🗑️  Deleted $BRANCH"

  deploy:
    needs: [test, auto-merge]
    # Deploy when:
    # 1. Direct push to main (auto-merge skipped) — standard CI/CD
    # 2. Feature branch auto-merged to main successfully
    if: |
      always() &&
      needs.test.result == 'success' &&
      github.event_name == 'push' &&
      (
        (github.ref == 'refs/heads/main' && needs.auto-merge.result == 'skipped') ||
        (needs.auto-merge.result == 'success')
      )
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ inputs.app-name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "❌ VPS_SSH_KEY secret not configured"
            echo "Add it at: Settings > Secrets > Actions"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync source to VPS
        run: |
          echo "📦 Syncing ${{ inputs.app-name }} to VPS..."
          rsync -az --delete \
            --exclude=node_modules --exclude=.git --exclude=data \
            --exclude='*.db' --exclude='*.db-*' \
            ${{ inputs.rsync-excludes }} \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ${{ inputs.source-subdir }} ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ inputs.vps-path }}/

      - name: Clone shared for deploy
        env:
          CLONE_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          SHARED_DIR="/tmp/shared-deps"
          if [ -n "$CLONE_TOKEN" ]; then
            git clone --depth 1 https://x-access-token:${CLONE_TOKEN}@github.com/chrishan-xyz/shared.git "$SHARED_DIR"
          else
            git clone --depth 1 https://github.com/chrishan-xyz/shared.git "$SHARED_DIR" 2>/dev/null || true
          fi

      - name: Sync shared dependencies to VPS
        run: |
          # Sync shared to VPS
          rsync -az --delete \
            --exclude=.git --exclude=node_modules \
            -e "ssh -i ~/.ssh/id_ed25519" \
            "/tmp/shared-deps/" ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:~/caddy/shared/

      - name: Prepare shared deps for Docker build (blue-green)
        if: inputs.deploy-strategy == 'blue-green'
        run: |
          # Blue-green builds Docker image locally — needs _shared/ in build context
          cd /tmp/shared-deps && npm install --omit=dev 2>/dev/null || true
          cd $GITHUB_WORKSPACE
          cp -r /tmp/shared-deps ./_shared
          echo "✅ _shared/ directory ready for local Docker build"

      # ──── ROLLBACK PREPARATION ────

      - name: Save rollback state (in-place)
        id: rollback-state
        if: inputs.deploy-strategy == 'in-place'
        continue-on-error: true
        run: |
          IMAGE_NAME="${{ inputs.docker-image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${{ inputs.container-name }}:latest"
          fi
          CONTAINER="${{ inputs.container-name }}"

          echo "🔖 Tagging current image for rollback..."
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<ROLLBACK_PREP
            CURRENT_IMAGE=\$(docker inspect --format='{{.Image}}' ${CONTAINER} 2>/dev/null || echo "")
            if [ -n "\$CURRENT_IMAGE" ]; then
              docker tag "\$CURRENT_IMAGE" "${IMAGE_NAME%:*}:rollback"
              echo "rollback_image=${IMAGE_NAME%:*}:rollback" >> /tmp/rollback-info
              echo "✅ Tagged current image as ${IMAGE_NAME%:*}:rollback"
            else
              echo "⚠️ No running container found — first deploy, skip rollback tag"
            fi
          ROLLBACK_PREP

      - name: Save rollback state (blue-green)
        id: rollback-state-bg
        if: inputs.deploy-strategy == 'blue-green'
        continue-on-error: true
        run: |
          echo "🔖 Recording active color for rollback..."
          ACTIVE_COLOR=$(ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            'cat ~/caddy/arlos/active-color 2>/dev/null || echo "unknown"')
          echo "active_color=${ACTIVE_COLOR}" >> "$GITHUB_OUTPUT"
          echo "✅ Active color before deploy: ${ACTIVE_COLOR}"

      # ──── BUILD (in-place) ────

      - name: Build container image (in-place)
        if: inputs.deploy-strategy == 'in-place'
        run: |
          IMAGE_NAME="${{ inputs.docker-image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${{ inputs.container-name }}:latest"
          fi
          VPS_DIR="${{ inputs.vps-path }}"

          echo "🐳 Building ${{ inputs.app-name }} image..."
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<BUILD_SCRIPT
            cd ~/caddy || exit 1

            # Copy shared libs into Docker build context
            rm -rf ${VPS_DIR##*/}/_shared
            cp -r ~/caddy/shared ${VPS_DIR##*/}/_shared

            # Build image
            docker build --no-cache \
              --build-arg COMMIT_SHA=${{ github.sha }} \
              --build-arg GIT_SHA=${{ github.sha }} \
              -t ${IMAGE_NAME} ${VPS_DIR##*/}/ || { echo "❌ Docker build failed"; exit 1; }

            echo "✅ Image ${IMAGE_NAME} built successfully"
          BUILD_SCRIPT

      # ──── SMOKE TEST (in-place) ────

      - name: Smoke test container (in-place)
        if: inputs.deploy-strategy == 'in-place'
        continue-on-error: true
        run: |
          IMAGE_NAME="${{ inputs.docker-image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${{ inputs.container-name }}:latest"
          fi
          CONTAINER="smoke-test-${{ inputs.container-name }}"
          HEALTH_PORT="${{ inputs.health-port }}"
          HEALTH_PATH="${{ inputs.health-endpoint }}"
          SMOKE_ROUTES="${{ inputs.smoke-test-routes }}"

          echo "🧪 Running smoke test for ${{ inputs.app-name }}..."
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<SMOKE_SCRIPT
            # Cleanup any leftover smoke test container
            docker rm -f ${CONTAINER} 2>/dev/null || true

            # Boot container in isolation on a random high port
            docker run -d --name ${CONTAINER} -e NODE_ENV=test -p 0:${HEALTH_PORT} ${IMAGE_NAME} || {
              echo "❌ Failed to start smoke test container"
              exit 1
            }

            # Discover the assigned host port
            HOST_PORT=\$(docker port ${CONTAINER} ${HEALTH_PORT} | head -1 | cut -d: -f2)
            if [ -z "\$HOST_PORT" ]; then
              echo "❌ Could not determine mapped port"
              docker logs ${CONTAINER} --tail 20
              docker rm -f ${CONTAINER} 2>/dev/null || true
              exit 1
            fi
            echo "  Container running on host port \$HOST_PORT"

            # Wait up to 30s for health endpoint
            echo "⏳ Checking health endpoint ${HEALTH_PATH}..."
            HEALTHY=0
            for i in \$(seq 1 6); do
              sleep 5
              HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:\${HOST_PORT}${HEALTH_PATH} 2>/dev/null || echo "000")
              if [ "\$HTTP_CODE" = "200" ]; then
                HEALTHY=1
                echo "  ✅ Health endpoint returned 200"
                break
              fi
              echo "  Attempt \$i/6: got HTTP \$HTTP_CODE, waiting..."
            done

            if [ "\$HEALTHY" -ne 1 ]; then
              echo "❌ Health check failed after 30s"
              docker logs ${CONTAINER} --tail 30
              docker rm -f ${CONTAINER} 2>/dev/null || true
              exit 1
            fi

            # Check additional smoke test routes if provided
            if [ -n "${SMOKE_ROUTES}" ]; then
              echo "🔍 Checking additional routes: ${SMOKE_ROUTES}"
              IFS=',' read -ra ROUTES <<< "${SMOKE_ROUTES}"
              for ROUTE in "\${ROUTES[@]}"; do
                ROUTE=\$(echo "\$ROUTE" | xargs)  # trim whitespace
                HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:\${HOST_PORT}\${ROUTE} 2>/dev/null || echo "000")
                if [ "\$HTTP_CODE" = "200" ]; then
                  echo "  ✅ \${ROUTE} → 200"
                else
                  echo "  ❌ \${ROUTE} → HTTP \$HTTP_CODE"
                  docker logs ${CONTAINER} --tail 30
                  docker rm -f ${CONTAINER} 2>/dev/null || true
                  exit 1
                fi
              done
            fi

            # Cleanup smoke test container
            docker rm -f ${CONTAINER} 2>/dev/null || true
            echo "✅ Smoke test passed for ${{ inputs.app-name }}"
          SMOKE_SCRIPT

      # ──── DEPLOY (in-place) ────

      - name: Deploy container (in-place)
        id: deploy-inplace
        if: inputs.deploy-strategy == 'in-place'
        run: |
          CONTAINER="${{ inputs.container-name }}"
          HEALTH_PORT="${{ inputs.health-port }}"
          HEALTH_PATH="${{ inputs.health-endpoint }}"

          echo "🚀 Deploying ${{ inputs.app-name }} (in-place)..."
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<DEPLOY_SCRIPT
            cd ~/caddy || exit 1

            # Rebuild image from updated source (rsync already copied new code)
            docker compose build --no-cache ${CONTAINER} || { echo "❌ Docker build failed"; exit 1; }

            # Restart container via compose
            docker compose up -d --force-recreate ${CONTAINER} || { echo "❌ Docker compose up failed"; exit 1; }

            # Post-deploy health check
            echo "⏳ Waiting for health check..."
            for i in \$(seq 1 12); do
              sleep 5
              STATUS=\$(docker exec ${CONTAINER} wget -q -O- http://127.0.0.1:${HEALTH_PORT}${HEALTH_PATH} 2>/dev/null | grep -c '"status"' || true)
              if [ "\$STATUS" -ge "1" ]; then
                echo "✅ ${{ inputs.app-name }} deployed and healthy"
                exit 0
              fi
              echo "  Attempt \$i/12: waiting..."
            done

            echo "⚠️ Health check failed after 60s"
            docker logs ${CONTAINER} --tail 20
            exit 1
          DEPLOY_SCRIPT

      # ──── BUILD + DEPLOY (blue-green) ────

      - name: Build and deploy container (blue-green)
        id: deploy-bg
        if: inputs.deploy-strategy == 'blue-green'
        run: |
          GHCR_IMAGE="${{ inputs.ghcr-image }}"
          if [ -z "$GHCR_IMAGE" ]; then
            echo "❌ ghcr-image input is required for blue-green deploy strategy"
            exit 1
          fi
          IMAGE_TAG="${GHCR_IMAGE}:${{ github.sha }}"

          echo "🐳 Building ${{ inputs.app-name }} for blue-green deploy..."

          # Login to GHCR
          echo "${{ secrets.GHCR_TOKEN || github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Build image locally in CI runner
          docker build --no-cache \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t "${IMAGE_TAG}" \
            -t "${GHCR_IMAGE}:latest" \
            ${{ inputs.source-subdir }} || { echo "❌ Docker build failed"; exit 1; }

          # Push to GHCR
          echo "📦 Pushing ${IMAGE_TAG} to GHCR..."
          docker push "${IMAGE_TAG}" || { echo "❌ GHCR push failed"; exit 1; }
          docker push "${GHCR_IMAGE}:latest" || true

          # SSH to VPS and run blue-green deploy script
          echo "🔄 Running blue-green deploy on VPS..."
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<BGDEPLOY
            ~/caddy/arlos/scripts/deploy-blue-green.sh \
              --image "${IMAGE_TAG}" \
              --commit "${{ github.sha }}"
          BGDEPLOY

      # ──── POST-DEPLOY HEALTH CHECK ────

      - name: Post-deploy health check
        id: health-check
        continue-on-error: true
        run: |
          CONTAINER="${{ inputs.container-name }}"
          HEALTH_PORT="${{ inputs.health-port }}"
          HEALTH_PATH="${{ inputs.health-endpoint }}"
          STRATEGY="${{ inputs.deploy-strategy }}"

          echo "🏥 Running post-deploy health check for ${{ inputs.app-name }}..."
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<HEALTHCHECK
            HEALTHY=0

            if [ "${STRATEGY}" = "blue-green" ]; then
              # For blue-green, check via the active container
              ACTIVE_COLOR=\$(cat ~/caddy/arlos/active-color 2>/dev/null || echo "blue")
              ACTIVE_CONTAINER="${CONTAINER}-\${ACTIVE_COLOR}"
              echo "  Checking active container: \${ACTIVE_CONTAINER}"
            else
              ACTIVE_CONTAINER="${CONTAINER}"
            fi

            for i in \$(seq 1 6); do
              sleep 5
              STATUS=\$(docker exec \${ACTIVE_CONTAINER} wget -q -O- http://127.0.0.1:${HEALTH_PORT}${HEALTH_PATH} 2>/dev/null | grep -c '"status"' || true)
              if [ "\$STATUS" -ge "1" ]; then
                echo "✅ Post-deploy health check passed"
                HEALTHY=1
                break
              fi
              echo "  Health check attempt \$i/6: waiting..."
            done

            if [ "\$HEALTHY" -ne 1 ]; then
              echo "❌ Post-deploy health check FAILED"
              docker logs \${ACTIVE_CONTAINER} --tail 30
              exit 1
            fi
          HEALTHCHECK

      # ──── DB_PATH VALIDATION ────

      - name: Validate DB_PATH environment
        if: inputs.db-validation && steps.health-check.outcome == 'success'
        continue-on-error: true
        run: |
          CONTAINER="${{ inputs.container-name }}"
          APP_NAME="${{ inputs.app-name }}"
          STRATEGY="${{ inputs.deploy-strategy }}"

          echo "🔍 Validating DB_PATH for ${APP_NAME}..."
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<DBCHECK
            if [ "${STRATEGY}" = "blue-green" ]; then
              ACTIVE_COLOR=\$(cat ~/caddy/arlos/active-color 2>/dev/null || echo "blue")
              TARGET="${CONTAINER}-\${ACTIVE_COLOR}"
            else
              TARGET="${CONTAINER}"
            fi

            DB_PATH=\$(docker exec \${TARGET} printenv DB_PATH 2>/dev/null || echo "")

            if [ -z "\$DB_PATH" ]; then
              echo "ℹ️  DB_PATH not set in \${TARGET} — skipping validation (app may not use SQLite)"
              exit 0
            fi

            # Extract the database filename from the path (e.g. /data/arlos.db → arlos)
            DB_FILE=\$(basename "\$DB_PATH" .db)
            echo "  DB_PATH=\${DB_PATH} (db file: \${DB_FILE})"

            # Validate: the db filename should contain the app name
            if echo "\${DB_FILE}" | grep -qi "${APP_NAME}"; then
              echo "✅ DB_PATH correctly references ${APP_NAME}"
            else
              echo "❌ DB_PATH MISMATCH: expected db name to contain '${APP_NAME}' but got '\${DB_FILE}'"
              echo "  This may indicate a copy-paste error in docker-compose.yml"
              echo "  DB_PATH=\${DB_PATH}"
              exit 1
            fi
          DBCHECK

      # ──── PUBLIC URL VERIFICATION ────

      - name: Verify public URL
        id: public-url-check
        if: inputs.public-url != '' && steps.health-check.outcome == 'success'
        continue-on-error: true
        run: |
          PUBLIC_URL="${{ inputs.public-url }}"
          HEALTH_PATH="${{ inputs.health-endpoint }}"

          echo "🌐 Verifying public URL: ${PUBLIC_URL}"
          echo "   This checks the full path: Internet → DNS → Caddy → TLS → Container"

          CHECKS_PASSED=0
          CHECKS_TOTAL=0

          # Check 1: Root page loads
          CHECKS_TOTAL=$((CHECKS_TOTAL + 1))
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 20 -L "${PUBLIC_URL}/" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "  ✅ ${PUBLIC_URL}/ → ${HTTP_CODE}"
            CHECKS_PASSED=$((CHECKS_PASSED + 1))
          else
            echo "  ❌ ${PUBLIC_URL}/ → ${HTTP_CODE}"
          fi

          # Check 2: Health endpoint (may be behind auth — accept 200/401/302)
          CHECKS_TOTAL=$((CHECKS_TOTAL + 1))
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 20 -L "${PUBLIC_URL}${HEALTH_PATH}" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "  ✅ ${PUBLIC_URL}${HEALTH_PATH} → ${HTTP_CODE}"
            CHECKS_PASSED=$((CHECKS_PASSED + 1))
          else
            echo "  ❌ ${PUBLIC_URL}${HEALTH_PATH} → ${HTTP_CODE}"
          fi

          # Check 3: TLS certificate valid
          CHECKS_TOTAL=$((CHECKS_TOTAL + 1))
          DOMAIN=$(echo "${PUBLIC_URL}" | sed 's|https://||' | sed 's|/.*||')
          TLS_EXPIRY=$(echo | openssl s_client -servername "$DOMAIN" -connect "$DOMAIN:443" 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
          if [ -n "$TLS_EXPIRY" ]; then
            echo "  ✅ TLS cert valid (expires: ${TLS_EXPIRY})"
            CHECKS_PASSED=$((CHECKS_PASSED + 1))
          else
            echo "  ❌ TLS cert check failed"
          fi

          echo ""
          if [ "$CHECKS_PASSED" -eq "$CHECKS_TOTAL" ]; then
            echo "✅ Public URL verification passed (${CHECKS_PASSED}/${CHECKS_TOTAL})"
          else
            echo "⚠️ Public URL verification: ${CHECKS_PASSED}/${CHECKS_TOTAL} passed"
            exit 1
          fi

      # ──── DEEP SMOKE TEST (JSON API ROUTES) ────
      # Verifies API routes return 200 + JSON content-type after deploy.
      # This catches auth middleware bugs (401), wrong container serving (HTML),
      # and port conflicts. These routes MUST return real API responses.

      - name: Deep smoke test (JSON API routes)
        id: deep-smoke
        if: inputs.smoke-test-json-routes != '' && steps.health-check.outcome == 'success'
        run: |
          PUBLIC_URL="${{ inputs.public-url }}"
          JSON_ROUTES="${{ inputs.smoke-test-json-routes }}"

          if [ -z "$PUBLIC_URL" ]; then
            echo "⚠️ No public-url set, skipping deep smoke test"
            exit 0
          fi

          echo "🔬 Deep smoke test: verifying API routes return 200 + JSON"
          echo "   URL: ${PUBLIC_URL}"
          echo "   Routes: ${JSON_ROUTES}"
          echo ""

          FAILED=0
          IFS=',' read -ra ROUTES <<< "$JSON_ROUTES"
          for ROUTE in "${ROUTES[@]}"; do
            ROUTE=$(echo "$ROUTE" | xargs)  # trim whitespace
            FULL_URL="${PUBLIC_URL}${ROUTE}"

            # Get status code AND content-type in one request
            RESPONSE=$(curl -s -w "\n%{http_code}\n%{content_type}" --connect-timeout 10 --max-time 20 -L "$FULL_URL" 2>/dev/null)
            BODY=$(echo "$RESPONSE" | sed '$d' | sed '$d')
            HTTP_CODE=$(echo "$RESPONSE" | tail -2 | head -1)
            CONTENT_TYPE=$(echo "$RESPONSE" | tail -1)

            # Must be 200
            if [ "$HTTP_CODE" != "200" ]; then
              echo "  ❌ ${ROUTE} → HTTP ${HTTP_CODE} (expected 200)"
              FAILED=$((FAILED + 1))
              continue
            fi

            # Must be JSON content-type
            if echo "$CONTENT_TYPE" | grep -qi "json"; then
              echo "  ✅ ${ROUTE} → 200 + JSON"
            else
              echo "  ❌ ${ROUTE} → 200 but content-type is '${CONTENT_TYPE}' (expected JSON)"
              echo "     First 200 chars of body: $(echo "$BODY" | head -c 200)"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ Deep smoke test FAILED: $FAILED route(s) broken"
            echo "   This likely means auth middleware is blocking API routes or wrong container is serving traffic."
            exit 1
          else
            echo "✅ Deep smoke test passed: all API routes return 200 + JSON"
          fi

      # ──── CROSS-SITE SMOKE TEST ────
      # After individual site checks pass, verify ALL sites are still healthy.
      # A deploy to one site can break others (shared Caddyfile, network, etc).

      - name: Cross-site smoke test
        id: cross-site-smoke
        if: steps.health-check.outcome == 'success'
        continue-on-error: true
        run: |
          echo "🧪 Running cross-site smoke test (all 4 sites)..."
          
          # Define all sites and their health endpoints
          declare -A SITES=(
            [arlos]="https://arlo.chrishan.xyz/api/health"
            [recharge]="https://recharge.chrishan.xyz/api/health"
            [brain]="https://brain.chrishan.xyz/api/health"
            [home]="https://chrishan.xyz/api/health"
          )
          
          FAILED=0
          for site in "${!SITES[@]}"; do
            url="${SITES[$site]}"
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 20 -L "$url" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "  ✅ $site ($url) → $HTTP_CODE"
            else
              echo "  ❌ $site ($url) → $HTTP_CODE"
              FAILED=$((FAILED + 1))
            fi
          done
          
          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "⚠️ Cross-site smoke test: $FAILED site(s) unreachable after deploying ${{ inputs.app-name }}"
            echo "  This deploy may have affected other sites (shared Caddyfile, network config, etc)"
            exit 1
          else
            echo ""
            echo "✅ All sites healthy after deploying ${{ inputs.app-name }}"
          fi

      # ──── GHCR REGISTRY SYNC (in-place) ────
      # After a successful in-place deploy, push the image to GHCR so the
      # registry always matches production. Only runs when docker-image-name
      # looks like a GHCR image (ghcr.io/...).

      - name: Push image to GHCR (in-place sync)
        if: >-
          inputs.deploy-strategy == 'in-place' &&
          steps.health-check.outcome == 'success' &&
          startsWith(inputs.docker-image-name, 'ghcr.io/')
        continue-on-error: true
        run: |
          IMAGE_NAME="${{ inputs.docker-image-name }}"
          GHCR_REPO="${IMAGE_NAME%:*}"
          COMMIT_TAG="${GHCR_REPO}:${{ github.sha }}"
          LATEST_TAG="${GHCR_REPO}:latest"

          echo "📦 Syncing in-place image to GHCR..."
          echo "   ${IMAGE_NAME} → ${COMMIT_TAG} + ${LATEST_TAG}"

          GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
          if [ -z "$GHCR_TOKEN" ]; then
            GHCR_TOKEN="${{ github.token }}"
          fi

          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<GHCR_PUSH
            # Login to GHCR from VPS
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || {
              echo "⚠️ GHCR login failed — skipping registry sync"
              exit 0
            }

            # Tag with commit SHA for traceability
            docker tag "${IMAGE_NAME}" "${COMMIT_TAG}" || {
              echo "⚠️ Could not tag image — skipping registry sync"
              exit 0
            }
            docker tag "${IMAGE_NAME}" "${LATEST_TAG}" || true

            # Push both commit-specific and latest tags
            docker push "${COMMIT_TAG}" && echo "  ✅ Pushed ${COMMIT_TAG}"
            docker push "${LATEST_TAG}" && echo "  ✅ Pushed ${LATEST_TAG}"

            # Cleanup: remove the commit-tagged local image to save disk
            docker rmi "${COMMIT_TAG}" 2>/dev/null || true

            echo "✅ GHCR registry synced with production"
          GHCR_PUSH

      # ──── ROLLBACK ON FAILURE ────

      - name: Rollback (in-place)
        if: steps.health-check.outcome == 'failure' && inputs.deploy-strategy == 'in-place'
        run: |
          IMAGE_NAME="${{ inputs.docker-image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${{ inputs.container-name }}:latest"
          fi
          CONTAINER="${{ inputs.container-name }}"
          ROLLBACK_TAG="${IMAGE_NAME%:*}:rollback"
          HEALTH_PORT="${{ inputs.health-port }}"
          HEALTH_PATH="${{ inputs.health-endpoint }}"

          echo "🔄 ROLLING BACK ${{ inputs.app-name }} to previous image..."
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<ROLLBACK
            cd ~/caddy || exit 1

            # Check if rollback image exists
            if ! docker image inspect ${ROLLBACK_TAG} >/dev/null 2>&1; then
              echo "❌ No rollback image found (${ROLLBACK_TAG}) — cannot rollback"
              echo "  This may be a first deploy with no previous image"
              exit 1
            fi

            # Re-tag rollback image as latest so compose picks it up
            docker tag ${ROLLBACK_TAG} ${IMAGE_NAME}
            echo "  Tagged ${ROLLBACK_TAG} → ${IMAGE_NAME}"

            # Force recreate with the rolled-back image
            docker compose up -d ${CONTAINER} --force-recreate || {
              echo "❌ Rollback compose up failed"
              exit 1
            }

            # Verify rollback health
            echo "⏳ Verifying rollback health..."
            for i in \$(seq 1 12); do
              sleep 5
              STATUS=\$(docker exec ${CONTAINER} wget -q -O- http://127.0.0.1:${HEALTH_PORT}${HEALTH_PATH} 2>/dev/null | grep -c '"status"' || true)
              if [ "\$STATUS" -ge "1" ]; then
                echo "✅ Rollback successful — ${{ inputs.app-name }} restored to previous version"
                exit 0
              fi
              echo "  Rollback health attempt \$i/12: waiting..."
            done

            echo "❌ Rollback also failed health check — manual intervention required"
            docker logs ${CONTAINER} --tail 30
            exit 1
          ROLLBACK

      - name: Rollback (blue-green)
        if: steps.health-check.outcome == 'failure' && inputs.deploy-strategy == 'blue-green'
        run: |
          PREV_COLOR="${{ steps.rollback-state-bg.outputs.active_color }}"
          CONTAINER="${{ inputs.container-name }}"
          HEALTH_PORT="${{ inputs.health-port }}"
          HEALTH_PATH="${{ inputs.health-endpoint }}"

          if [ "$PREV_COLOR" = "unknown" ] || [ -z "$PREV_COLOR" ]; then
            echo "❌ Cannot rollback — previous active color unknown"
            exit 1
          fi

          echo "🔄 ROLLING BACK ${{ inputs.app-name }} to previous color: ${PREV_COLOR}..."
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<BGROLLBACK
            cd ~/caddy || exit 1

            # Swap back to previous color
            PREV_CONTAINER="${CONTAINER}-${PREV_COLOR}"

            # Restart previous color container
            docker compose up -d \${PREV_CONTAINER} || {
              echo "❌ Failed to restart previous color container"
              exit 1
            }

            # Update active color marker
            echo "${PREV_COLOR}" > ~/caddy/arlos/active-color

            # Update Caddy upstream to point back to previous color
            # The deploy-blue-green.sh script manages Caddy config; we reverse it
            if [ "${PREV_COLOR}" = "blue" ]; then
              NEW_COLOR="green"
            else
              NEW_COLOR="blue"
            fi

            # Stop the failed new color container
            docker compose stop ${CONTAINER}-\${NEW_COLOR} 2>/dev/null || true

            # Verify rollback health
            echo "⏳ Verifying rollback health on \${PREV_CONTAINER}..."
            for i in \$(seq 1 6); do
              sleep 5
              STATUS=\$(docker exec \${PREV_CONTAINER} wget -q -O- http://127.0.0.1:${HEALTH_PORT}${HEALTH_PATH} 2>/dev/null | grep -c '"status"' || true)
              if [ "\$STATUS" -ge "1" ]; then
                echo "✅ Rollback successful — ${{ inputs.app-name }} restored to ${PREV_COLOR}"
                exit 0
              fi
              echo "  Rollback health attempt \$i/6: waiting..."
            done

            echo "❌ Rollback also failed — manual intervention required"
            docker logs \${PREV_CONTAINER} --tail 30
            exit 1
          BGROLLBACK

      - name: Fail workflow if rollback was triggered
        if: steps.health-check.outcome == 'failure'
        run: |
          echo "❌ Deploy failed post-deploy health check and rollback was triggered"
          echo "  Check the rollback step above for details"
          exit 1

      - name: Fail workflow if public URL check failed
        if: steps.public-url-check.outcome == 'failure'
        run: |
          echo "❌ Deploy succeeded but public URL verification failed"
          echo "  The container is healthy but the site may not be reachable through Caddy/TLS"
          echo "  Check Caddyfile config, DNS, and TLS certificates"
          exit 1

      # ──── CLEANUP ────

      - name: Cleanup merged branches
        if: success()
        continue-on-error: true
        run: |
          echo "🧹 Cleaning merged remote branches..."
          git fetch --prune origin
          BRANCHES=$(git branch -r --merged origin/main | grep -v 'origin/main' | grep -v 'origin/HEAD' | sed 's|origin/||' || true)
          if [ -z "$BRANCHES" ]; then
            echo "✅ No merged branches to clean"
          else
            echo "$BRANCHES" | while read branch; do
              echo "  Deleting: $branch"
              git push origin --delete "$branch" 2>/dev/null || true
            done
            echo "✅ Branch cleanup complete"
          fi

      - name: Prune Docker images
        if: success()
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<'PRUNE'
            echo "🧹 Pruning Docker images across all apps..."
            # Prune all dangling images (untagged, no longer referenced)
            docker image prune -f 2>/dev/null || true
            # Also prune builder cache older than 48h
            docker builder prune -f --filter 'until=48h' 2>/dev/null || true
            # Clean up stopped containers
            docker container prune -f --filter 'until=24h' 2>/dev/null || true
            echo "📊 Disk usage:"
            df -h / || true
            echo "📦 Docker disk usage:"
            docker system df 2>/dev/null || true
          PRUNE

      - name: Record deployment
        if: always()
        continue-on-error: true
        run: |
          COMMIT_MSG=$(printf '%s' "${{ github.event.head_commit.message }}" | head -1 | cut -c1-200)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          DEPLOY_STATUS="success"
          if [ "${{ steps.health-check.outcome }}" = "failure" ]; then
            DEPLOY_STATUS="rolled_back"
          elif [ "${{ job.status }}" = "failure" ] || [ "${{ job.status }}" = "cancelled" ]; then
            DEPLOY_STATUS="failed"
          fi

          ARLOS_KEY="${{ secrets.ARLOS_API_KEY }}"
          if [ -n "$ARLOS_KEY" ]; then
            JSON=$(jq -n \
              --arg app "${{ inputs.app-name }}" \
              --arg hash "${{ github.sha }}" \
              --arg short "$(echo '${{ github.sha }}' | cut -c1-7)" \
              --arg msg "$COMMIT_MSG" \
              --arg branch "main" \
              --arg status "$DEPLOY_STATUS" \
              --arg actor "${{ github.actor }}" \
              --arg url "$RUN_URL" \
              '{app:$app, commit_hash:$hash, commit_short:$short, commit_message:$msg, branch:$branch, status:$status, actor:$actor, run_url:$url}')

            curl -sf -X POST "${{ env.ARLOS_URL }}/api/deploys" \
              -H "Content-Type: application/json" \
              -H "x-arlo-api-key: $ARLOS_KEY" \
              -d "$JSON" || echo "⚠️ Failed to record deployment (non-fatal)"
          else
            echo "ℹ️ ARLOS_API_KEY not set — skipping deploy recording"
          fi

      - name: Notify via ntfy
        if: always()
        continue-on-error: true
        run: |
          NTFY_KEY="${{ secrets.NTFY_TOKEN }}"
          if [ -z "$NTFY_KEY" ]; then
            echo "ℹ️ NTFY_TOKEN not set — skipping notification"
            exit 0
          fi

          COMMIT_SHORT=$(echo '${{ github.sha }}' | cut -c1-7)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          DEPLOY_STATUS="success"
          if [ "${{ steps.health-check.outcome }}" = "failure" ]; then
            DEPLOY_STATUS="rolled_back"
          elif [ "${{ job.status }}" = "failure" ] || [ "${{ job.status }}" = "cancelled" ]; then
            DEPLOY_STATUS="failed"
          fi

          if [ "$DEPLOY_STATUS" = "success" ]; then
            MSG="✅ Deployed ${{ inputs.app-name }} (${COMMIT_SHORT})"
          elif [ "$DEPLOY_STATUS" = "rolled_back" ]; then
            MSG="🔴 Deploy failed + rolled back: ${{ inputs.app-name }} (${COMMIT_SHORT})"
          else
            MSG="🔴 Deploy failed: ${{ inputs.app-name }} (${COMMIT_SHORT})"
          fi

          curl -sf -d "${MSG}" \
            -H "Authorization: Bearer ${NTFY_KEY}" \
            -H "Title: CI: ${{ inputs.app-name }}" \
            -H "Tags: $( [ "$DEPLOY_STATUS" = "success" ] && echo "white_check_mark" || echo "rotating_light" )" \
            -H "Click: ${RUN_URL}" \
            -H "Priority: $( [ "$DEPLOY_STATUS" = "success" ] && echo "default" || echo "high" )" \
            "https://ntfy.chrishan.xyz/ci" || echo "⚠️ Failed to send ntfy notification (non-fatal)"

      - name: Signal CI failure to Hatch
        if: failure()
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || '204.168.189.154' }}
          VPS_USER: ${{ secrets.VPS_USER || 'chris' }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SIGNAL_DIR="/tmp/ci-failures"
          SIGNAL_FILE="$SIGNAL_DIR/${{ inputs.app-name }}-${{ github.run_id }}.json"
          ssh -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST} "
            mkdir -p $SIGNAL_DIR
            cat > $SIGNAL_FILE << SIGNAL_EOF
          {
            \"app\": \"${{ inputs.app-name }}\",
            \"repo\": \"${{ github.repository }}\",
            \"run_id\": ${{ github.run_id }},
            \"run_url\": \"$RUN_URL\",
            \"sha\": \"${{ github.sha }}\",
            \"branch\": \"${{ github.ref_name }}\",
            \"actor\": \"${{ github.actor }}\",
            \"failed_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }
          SIGNAL_EOF
          " || echo "⚠️ Failed to write CI failure signal (non-fatal)"
